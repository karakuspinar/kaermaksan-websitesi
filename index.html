<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}
header{
    padding:30px;
}
.buttons a{
    display:inline-block;
    margin:10px;
    padding:12px 22px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-size:18px;
}
.facebook{background:#1877f2;}
.instagram{background:#e1306c;}
.whatsapp{background:#25d366;}
.slider-container{
    position:relative;
    width:90%;
    margin:auto;
    overflow:hidden;
}
.slider{
    display:flex;
    overflow-x:auto;
    scroll-behavior:smooth;
}
.slider::-webkit-scrollbar{
    display:none;
}
.slider img{
    width:400px;
    margin:10px;
    border-radius:15px;
    flex-shrink:0;
}
button{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:white;
    color:black;
    border:none;
    font-size:30px;
    padding:10px 15px;
    cursor:pointer;
    border-radius:10px;
}
.prev{
    left:0;
}
.next{
    right:0;
}
</style>
<header>
    <h1>Kaermaksan</h1>
    <h3>📞 +90 501 561 76 90</h3>
</header>
<div class="buttons">
    <a class="facebook" href="https://facebook.com">Facebook</a>
    <a class="instagram" href="https://instagram.com">Instagram</a>
    <a class="whatsapp" href="https://wa.me/905015617690">WhatsApp</a>
</div>
<div class="slider-container">
    <button class="prev" onclick="scrollLeftSlider()">❮</button>
    <div class="slider" id="slider">
        <img src="resim1.jpg">
        <img src="resim2.jpg">
        <img src="resim3.jpg">
    </div>
    <button class="next" onclick="scrollRightSlider()">❯</button>
</div>
<script>
function scrollLeftSlider(){
    document.getElementById('slider')
    .scrollBy({
        left:-420,
        behavior:'smooth'
    });
}
function scrollRightSlider(){
    document.getElementById('slider')
    .scrollBy({
        left:420,
        behavior:'smooth'
    });
}
</script>
